<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGG Tools — Top Mutants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/top-mutants.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
</head>
<body>
<div class="app-layout">

  <!-- ══ SIDEBAR ══════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-icon" viewBox="0 0 32 32" fill="none">
        <path d="M16 3L28 9V23L16 29L4 23V9L16 3Z" stroke="#4fa3e0" stroke-width="1.5" fill="rgba(79,163,224,0.08)"/>
        <path d="M10 14l4 4 8-6" stroke="#f0a030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="16" cy="16" r="3" fill="#4fa3e0" opacity="0.5"/>
      </svg>
      <span class="brand-name">MGG Tools</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label" data-i18n="home">Home</span>
      </a>
      <div class="nav-section-label" data-i18n="sectionApps">APPS</div>
      <a class="nav-item" href="mutants-list">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3l-4 4-4-4"/></svg>
        <span class="nav-label" data-i18n="mutantsList">Mutants List</span>
      </a>
      <a class="nav-item" href="stats">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-label" data-i18n="statsSimulator">Stats Simulator</span>
      </a>
      <a class="nav-item" href="evo-calculator">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span class="nav-label" data-i18n="evoCalculator">Evo Calculator</span>
      </a>
      <a class="nav-item active" href="top-mutants">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        <span class="nav-label" data-i18n="topMutants">Top Mutants</span>
      </a>
      <a class="nav-item" href="damage-simulator">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 3a3 3 0 0 0-3 3l-7 3.5L5 7l-.5.5 4 3L7 13.5l-.5.5 3 1.5 1.5 3 .5-.5-1-2.5 3-1.5 3 4.5.5-.5L15 14l3.5-7A3 3 0 0 0 18 3z"/></svg>
        <span class="nav-label" data-i18n="damageSimulator">Damage Simulator</span>
      </a>
      <a class="nav-item" href="mutant-builder">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span class="nav-label" data-i18n="mutantBuilder">Mutant Builder</span>
      </a>
      <a class="nav-item" href="compare">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
        <span class="nav-label" data-i18n="compareMutants">Compare</span>
      </a>
      <div class="nav-section-label" data-i18n="sectionInfo">INFO</div>
      <a class="nav-item" href="rebalance">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        <span class="nav-label" data-i18n="rebalance">Rebalance</span>
      </a>
      <div class="nav-section-label" data-i18n="sectionDocs">DOCUMENTATION</div>
      <a class="nav-item" href="credits">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="nav-label" data-i18n="credits">Credits</span>
      </a>
      <a class="nav-item" href="changelog">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        <span class="nav-label" data-i18n="changelog">Changelog</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="collapse-btn" id="collapseBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
        <span id="collapseLabel" data-i18n="collapseMenu">Collaps</span>
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ════════════════════════════════════════════ -->
  <div class="main-content" id="mainContent">

    <header class="topbar">
      <div class="topbar-controls">
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="es"><span class="flag">🇪🇸</span> ES</button>
          <button class="lang-btn" data-lang="en"><span class="flag">🇬🇧</span> EN</button>
        </div>
        <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <main class="page-content">
      <h2 class="section-heading" data-i18n="topMutants">Top Mutants</h2>

      <!-- Gene Selector -->
      <div class="gene-selector" id="geneSelector">

        <!-- Loading indicator inside selector -->
        <div class="top-spinner" id="selectorSpinner"></div>

        <!-- Buttons injected by JS after CSV loads -->
      </div>

      <!-- Table output -->
      <div id="mutant-table-container">
        <div class="top-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
          <p data-i18n="topSelectPrompt">Selecciona un gen para ver el Top 10</p>
        </div>
      </div>
    </main>

    <footer class="site-footer"></footer>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/topmutants.js"></script>
<script src="/js/footer.js"></script>
<script src="/js/names-es.js"></script>

</body>
</html>
